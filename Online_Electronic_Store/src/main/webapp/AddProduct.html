<!DOCTYPE html>
<html>
<head>
    <meta charset="ISO-8859-1">
    <title>Add New Product</title>
    <link rel="stylesheet" href="css/add-product.css">
</head>
<body>
    <div class="product-card">
        <h1><u>Add New Product</u></h1>
        <form action="aps" method="post" class="product-form">
            <label>Product Code</label>
            <input type="text" name="pcode" required><br>

            <label>Product Name</label>
            <input type="text" name="pname" required><br>

            <label>Product Company</label>
            <input type="text" name="pcompany" required><br>

            <label>Product Price</label>
            <input type="text" name="pprice" required><br>

            <label>Product Quantity</label>
            <input type="text" name="pqty" required><br>

            <button type="submit">Add Product</button><br>
         
        </form>
  

    </div>
</body>
</html>

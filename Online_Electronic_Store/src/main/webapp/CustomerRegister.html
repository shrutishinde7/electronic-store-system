<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Customer Registration</title>
<link rel="stylesheet" href="css/customer-form.css">

</head>
<body>
  <div class="page-wrapper">
    <div class="form-container">
      <h1>Enter Customer Details</h1>
      <form action="crs" method="post">
        <label>User Name</label>
        <input type="text" name="cuname">
        <label>Password</label>
        <input type="text" name="cpword">
        <label>First Name</label>
        <input type="text" name="cfname">
        <label>Last Name</label>
        <input type="text" name="clname">
        <label>Address</label>
        <input type="text" name="caddr">
        <label>Mail Id</label>
        <input type="text" name="cmid">
        <label>Phone No</label>
        <input type="text" name="cphno">
        <input type="submit" value="Register">
      </form>
    </div>
  </div>
</body>

</html>

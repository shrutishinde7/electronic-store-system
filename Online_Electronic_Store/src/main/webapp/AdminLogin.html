<!DOCTYPE html>
<html>
<head>
    <meta charset="ISO-8859-1">
    <title>Admin Login - Online Electronic Store</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <form action="alog" method="post">
            <label for="aname">Username</label>
            <input type="text" name="aname" id="aname" required>

            <label for="apwd">Password</label>
            <input type="password" name="apwd" id="apwd" required>

            <input type="submit" value="Login">
        </form>
        <div class="back-link">
            <a href="index.html"> Go Back</a>
        </div>
    </div>
</body>
</html>
